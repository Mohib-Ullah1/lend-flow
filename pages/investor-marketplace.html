<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Marketplace · LendFlow Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/><script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b'}}}}}</script>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-secondary);color:var(--text-primary);">
<header class="sticky top-0 z-30 border-b backdrop-blur-sm" style="background:var(--surface-glass);border-color:var(--border);"><div class="mx-auto max-w-6xl flex items-center justify-between px-6 h-16"><a href="#" class="flex items-center gap-2.5"><div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600"><svg class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75"/></svg></div><span class="text-base font-semibold">LendFlow</span></a><nav class="hidden sm:flex items-center gap-1"><a href="investor-dashboard.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Portfolio</a><a href="investor-performance.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Performance</a><a href="investor-marketplace.html" class="rounded-lg px-3 py-2 text-sm font-medium text-brand-600" style="background:rgba(97,114,243,0.08);">Marketplace</a><a href="investor-reports.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Reports</a></nav><div class="flex items-center gap-3"><button @click="$store.theme.toggle()" class="rounded-lg p-2" style="color:var(--text-muted);"><svg x-show="!$store.theme.dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg><svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg></button><div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">RJ</div></div></div></header>

<main class="mx-auto max-w-6xl px-6 py-8" x-data="{ showInvest: false, selectedLoan: null }">
  <div class="space-y-6 animate-fade-in">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div><h1 class="text-[24px] font-bold tracking-tight" style="letter-spacing:-0.02em;">Loan Marketplace</h1><p class="mt-1 text-sm" style="color:var(--text-muted);">Browse and invest in approved loans.</p></div>
      <div class="flex items-center gap-3">
        <div class="relative max-w-xs"><svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg><input type="search" placeholder="Search loans..." class="w-full rounded-xl border-0 py-2.5 pl-9 pr-4 text-sm ring-1 ring-inset" style="background:var(--surface);ring-color:var(--border);color:var(--text-primary);"/></div>
        <select class="rounded-xl border-0 py-2.5 px-4 text-sm ring-1 ring-inset" style="background:var(--surface);ring-color:var(--border);color:var(--text-primary);"><option>All Grades</option><option>A+ / A</option><option>B</option><option>C</option></select>
        <select class="rounded-xl border-0 py-2.5 px-4 text-sm ring-1 ring-inset" style="background:var(--surface);ring-color:var(--border);color:var(--text-primary);"><option>All Products</option><option>Personal</option><option>Auto</option><option>Business</option></select>
      </div>
    </div>

    <!-- Available loans grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
      <template x-for="loan in [
        {id:'LN-01380',prod:'Personal',amt:'$18,000',term:'36 mo',rate:'8.5%',grade:'A',gc:'emerald',score:748,funded:'62%',remaining:'$6,840'},
        {id:'LN-01385',prod:'Auto',amt:'$32,000',term:'48 mo',rate:'6.2%',grade:'A',gc:'emerald',score:721,funded:'45%',remaining:'$17,600'},
        {id:'LN-01392',prod:'Business',amt:'$95,000',term:'60 mo',rate:'5.8%',grade:'B',gc:'blue',score:692,funded:'28%',remaining:'$68,400'},
        {id:'LN-01395',prod:'Personal',amt:'$12,000',term:'24 mo',rate:'9.8%',grade:'B',gc:'blue',score:678,funded:'80%',remaining:'$2,400'},
        {id:'LN-01398',prod:'Personal',amt:'$8,500',term:'12 mo',rate:'11.5%',grade:'C',gc:'amber',score:635,funded:'15%',remaining:'$7,225'},
        {id:'LN-01401',prod:'Auto',amt:'$22,000',term:'36 mo',rate:'7.2%',grade:'A',gc:'emerald',score:735,funded:'0%',remaining:'$22,000'}
      ]" :key="loan.id">
        <div class="rounded-2xl border p-5 shadow-sm card-lift" style="background:var(--surface);border-color:var(--border);">
          <div class="flex items-start justify-between mb-4">
            <div><p class="text-xs font-mono" style="color:var(--text-muted);" x-text="loan.id"></p><p class="text-sm font-semibold mt-0.5" x-text="loan.prod+' Loan'"></p></div>
            <span class="inline-flex h-7 w-7 items-center justify-center rounded-lg text-xs font-bold" :class="'bg-'+loan.gc+'-500/10 text-'+loan.gc+'-600'" x-text="loan.grade"></span>
          </div>
          <div class="grid grid-cols-2 gap-3 mb-4 text-sm">
            <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Amount</p><p class="font-semibold font-mono mt-0.5" x-text="loan.amt"></p></div>
            <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Rate</p><p class="font-semibold font-mono mt-0.5 text-emerald-600" x-text="loan.rate"></p></div>
            <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Term</p><p class="font-medium mt-0.5" x-text="loan.term"></p></div>
            <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Score</p><p class="font-mono font-medium mt-0.5" x-text="loan.score"></p></div>
          </div>
          <!-- Funding progress -->
          <div class="mb-4">
            <div class="flex items-center justify-between text-xs mb-1"><span style="color:var(--text-muted);">Funded</span><span class="font-mono font-medium" x-text="loan.funded"></span></div>
            <div class="h-2 rounded-full overflow-hidden" style="background:var(--surface-tertiary);"><div class="h-full rounded-full bg-brand-500 transition-all" :style="'width:'+loan.funded"></div></div>
            <p class="text-xs mt-1" style="color:var(--text-muted);"><span class="font-mono font-medium" x-text="loan.remaining"></span> remaining</p>
          </div>
          <button @click="selectedLoan=loan; showInvest=true;" class="w-full rounded-xl bg-brand-600 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700 btn-glow">Invest</button>
        </div>
      </template>
    </div>
  </div>

  <!-- Invest modal -->
  <div x-show="showInvest" x-cloak class="fixed inset-0 z-50">
    <div x-show="showInvest" x-transition.opacity class="fixed inset-0 bg-black/40 backdrop-blur-sm" @click="showInvest=false"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div x-show="showInvest" x-transition class="w-full max-w-md rounded-3xl border p-8 shadow-lg" style="background:var(--surface);border-color:var(--border);" x-data="{ amount: '', investing: false, invested: false }">
        <div x-show="!invested">
          <h3 class="text-lg font-semibold mb-1">Invest in Loan</h3>
          <p class="text-sm mb-6" style="color:var(--text-secondary);">Enter the amount you'd like to invest in <span class="font-mono font-semibold" x-text="selectedLoan?.id"></span>.</p>
          <div class="rounded-xl p-4 mb-5" style="background:var(--surface-secondary);">
            <div class="grid grid-cols-3 gap-3 text-sm">
              <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Available</p><p class="font-mono font-semibold mt-0.5" x-text="selectedLoan?.remaining"></p></div>
              <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Rate</p><p class="font-mono font-semibold mt-0.5 text-emerald-600" x-text="selectedLoan?.rate"></p></div>
              <div><p class="text-[10px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Grade</p><p class="font-semibold mt-0.5" x-text="selectedLoan?.grade"></p></div>
            </div>
          </div>
          <div class="mb-5"><label class="block text-[13px] font-medium mb-1.5">Investment amount</label><div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-medium" style="color:var(--text-muted);">$</span><input type="text" x-model="amount" placeholder="5,000" class="w-full rounded-xl border py-3 pl-8 pr-4 text-lg font-bold font-mono" style="background:var(--surface-secondary);border-color:var(--border);color:var(--text-primary);" onfocus="this.style.borderColor='var(--brand-500)';this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'" onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'"/></div><p class="text-xs mt-1.5" style="color:var(--text-muted);">Min $100 · Max <span x-text="selectedLoan?.remaining"></span></p></div>
          <div class="flex gap-3">
            <button @click="showInvest=false" class="flex-1 rounded-xl border py-3 text-sm font-medium transition" style="border-color:var(--border);color:var(--text-secondary);" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'">Cancel</button>
            <button @click="investing=true; api.invest(selectedLoan?.id||'', parseFloat(amount||0)).then(()=>{investing=false;invested=true;}).catch(e=>{investing=false;alert(e?.data?.error||'Failed');});" :disabled="investing || !amount" class="flex-1 flex items-center justify-center rounded-xl bg-brand-600 py-3 text-sm font-semibold text-white transition hover:bg-brand-700 disabled:opacity-50 btn-glow"><span x-show="!investing">Confirm Investment</span><svg x-show="investing" x-cloak class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg></button>
          </div>
        </div>
        <div x-show="invested" x-transition class="text-center py-4">
          <div class="flex h-16 w-16 items-center justify-center rounded-full mx-auto mb-4 animate-bounce-in" style="background:rgba(16,185,129,0.1);"><svg class="h-7 w-7 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <h3 class="text-lg font-semibold text-emerald-700">Investment Confirmed!</h3>
          <p class="text-sm mt-1" style="color:var(--text-secondary);">$<span x-text="amount"></span> invested in <span x-text="selectedLoan?.id"></span></p>
          <button @click="showInvest=false; invested=false; amount='';" class="mt-6 rounded-xl bg-brand-600 px-6 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700">Done</button>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
if (!api.isLoggedIn()) window.location.href = 'login.html';
</script>
</body>
</html>
