<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Applications · LendFlow Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/><script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b'}}}}}</script>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-secondary);color:var(--text-primary);">

<div class="flex h-screen overflow-hidden">
  <!-- Sidebar (same as admin-dashboard, collapsed reference) -->
  <aside class="hidden lg:flex w-[260px] flex-col border-r" style="background:var(--surface);border-color:var(--border);">
    <div class="flex h-16 items-center px-4 justify-between"><a href="#" class="flex items-center gap-2.5"><div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600"><svg class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75"/></svg></div><span class="text-[15px] font-semibold">LendFlow</span></a></div>
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">
      <p class="px-3 mb-2 text-[10px] font-semibold uppercase tracking-widest" style="color:var(--text-muted);">Overview</p>
      <a href="admin-dashboard.html" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition" style="color:var(--text-secondary);" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'"><svg class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75"/></svg>Dashboard</a>
      <a href="admin-applications.html" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium" style="background:rgba(97,114,243,0.08);color:var(--brand-600);"><svg class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>Applications<span class="ml-auto flex h-5 min-w-[20px] items-center justify-center rounded-full bg-brand-500 px-1.5 text-[10px] font-bold text-white">12</span></a>
      <a href="#" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition" style="color:var(--text-secondary);" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'"><svg class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>Borrowers</a>
      <a href="#" class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition" style="color:var(--text-secondary);" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'"><svg class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75"/></svg>Active Loans</a>
    </nav>
    <div class="border-t p-3" style="border-color:var(--border);"><div class="flex items-center gap-3 rounded-xl p-2"><div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">AD</div><div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">Admin User</p><p class="text-xs truncate" style="color:var(--text-muted);">admin@lendflow.com</p></div></div></div>
  </aside>

  <div class="flex flex-1 flex-col overflow-hidden">
    <header class="flex h-14 items-center justify-between border-b px-6" style="background:var(--surface);border-color:var(--border);">
      <nav class="flex items-center gap-1.5 text-sm"><span style="color:var(--text-muted);">Admin</span><svg class="h-3 w-3" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg><span class="font-medium">Applications</span></nav>
      <button @click="$store.theme.toggle()" class="rounded-xl p-2" style="color:var(--text-muted);"><svg x-show="!$store.theme.dark" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg><svg x-show="$store.theme.dark" x-cloak class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg></button>
    </header>

    <main class="flex-1 overflow-y-auto"><div class="mx-auto max-w-[1400px] p-6 lg:p-8" x-data="{
      apps: [], tab: 'all', loading: true, search: '',
      async init() {
        if (!api.isLoggedIn()) { window.location.href = 'login.html'; return; }
        try { const res = await api.getApplications(); this.apps = res.results || []; } catch(e) { if(e?.status===401) window.location.href='login.html'; }
        this.loading = false;
      },
      get filtered() {
        let list = this.tab === 'all' ? this.apps : this.apps.filter(a => a.status === (this.tab === 'pending' ? 'submitted' : this.tab) || (this.tab === 'pending' && a.status === 'under_review'));
        if (this.search) { const s = this.search.toLowerCase(); list = list.filter(a => (a.borrower_name||'').toLowerCase().includes(s) || a.id.includes(s)); }
        return list;
      },
      cnt(t) { if(t==='all') return this.apps.length; if(t==='pending') return this.apps.filter(a=>['submitted','under_review'].includes(a.status)).length; return this.apps.filter(a=>a.status===t).length; },
      sc(s) { const m={approved:'emerald',disbursed:'violet',submitted:'blue',under_review:'amber',rejected:'red',draft:'zinc'}; return m[s]||'zinc'; }
    }">
      <div class="space-y-6 animate-fade-in">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
          <div><h1 class="text-[24px] font-bold tracking-tight" style="letter-spacing:-0.02em;">Applications</h1><p class="mt-1 text-sm" style="color:var(--text-muted);">Review and manage loan applications.</p></div>
          <button class="inline-flex items-center gap-2 rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700 btn-glow"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>Export</button>
        </div>

        <!-- Filters -->
        <div class="flex items-center gap-1 border-b" style="border-color:var(--border);">
          <template x-for="t in [{v:'all',l:'All'},{v:'pending',l:'Pending'},{v:'approved',l:'Approved'},{v:'rejected',l:'Rejected'},{v:'disbursed',l:'Disbursed'}]" :key="t.v">
            <button @click="tab=t.v" class="relative px-4 py-3 text-sm font-medium transition" :style="tab===t.v?'color:var(--brand-600);':'color:var(--text-muted);'"><span x-text="t.l"></span><span class="ml-1 rounded-full px-1.5 py-0.5 text-[10px] font-bold" :style="tab===t.v?'background:rgba(97,114,243,0.1);color:var(--brand-600);':'background:var(--surface-tertiary);color:var(--text-muted);'" x-text="cnt(t.v)"></span><div x-show="tab===t.v" class="absolute bottom-0 left-0 right-0 h-0.5 bg-brand-600 rounded-full"></div></button>
          </template>
        </div>

        <!-- Table -->
        <div class="rounded-2xl border shadow-sm overflow-hidden" style="background:var(--surface);border-color:var(--border);">
          <div class="flex items-center gap-3 px-5 py-4 border-b" style="border-color:var(--border);">
            <div class="relative flex-1 max-w-xs"><svg class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg><input type="search" placeholder="Search by name, ID..." class="w-full rounded-lg border-0 py-2 pl-9 pr-4 text-sm ring-1 ring-inset" style="background:var(--surface-secondary);ring-color:var(--border);color:var(--text-primary);"/></div>
            <select class="rounded-lg border-0 py-2 px-3 text-sm ring-1 ring-inset" style="background:var(--surface-secondary);ring-color:var(--border);color:var(--text-primary);"><option>All Products</option><option>Personal</option><option>Auto</option><option>Business</option></select>
            <select class="rounded-lg border-0 py-2 px-3 text-sm ring-1 ring-inset" style="background:var(--surface-secondary);ring-color:var(--border);color:var(--text-primary);"><option>All Grades</option><option>A+</option><option>A</option><option>B</option><option>C</option><option>D-E</option></select>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead><tr style="background:var(--surface-secondary);"><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Applicant</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Product</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Amount</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Grade</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Status</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Submitted</th><th class="px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-wider" style="color:var(--text-muted);">Level</th><th class="px-5 py-3"></th></tr></thead>
              <tbody class="divide-y" style="border-color:var(--border);">
                <tr x-show="loading"><td colspan="8" class="px-5 py-8 text-center text-sm" style="color:var(--text-muted);">Loading applications...</td></tr>
                <tr x-show="!loading && !filtered.length"><td colspan="8" class="px-5 py-8 text-center text-sm" style="color:var(--text-muted);">No applications found.</td></tr>
                <template x-for="a in filtered" :key="a.id">
                  <tr class="transition cursor-pointer" @click="location.href='admin-application-review.html?id='+a.id" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'">
                    <td class="px-5 py-3.5"><div class="flex items-center gap-3"><div class="flex h-8 w-8 items-center justify-center rounded-lg text-xs font-bold" style="background:var(--surface-tertiary);color:var(--text-secondary);" x-text="(a.borrower_name||'??').split(' ').map(w=>w[0]).join('')"></div><div><p class="text-sm font-medium" x-text="a.borrower_name||'Unknown'"></p><p class="text-xs" style="color:var(--text-muted);" x-text="'APP-'+a.id.substring(0,8)"></p></div></div></td>
                    <td class="px-5 py-3.5" style="color:var(--text-secondary);" x-text="a.product_name||'Loan'"></td>
                    <td class="px-5 py-3.5 font-mono font-medium" x-text="'$'+parseFloat(a.amount_requested).toLocaleString()"></td>
                    <td class="px-5 py-3.5"><span class="inline-flex h-6 w-6 items-center justify-center rounded text-[10px] font-bold" :class="'bg-'+sc(a.status)+'-500/10 text-'+sc(a.status)+'-600'" x-text="a.risk_grade||'—'"></span></td>
                    <td class="px-5 py-3.5"><span class="inline-flex items-center gap-1.5 rounded-lg px-2 py-0.5 text-[11px] font-semibold" :class="'bg-'+sc(a.status)+'-500/10 text-'+sc(a.status)+'-600'"><span class="h-1.5 w-1.5 rounded-full" :class="'bg-'+sc(a.status)+'-500'"></span><span x-text="a.status.replace('_',' ')"></span></span></td>
                    <td class="px-5 py-3.5 text-sm" style="color:var(--text-muted);" x-text="a.submitted_at ? new Date(a.submitted_at).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—'"></td>
                    <td class="px-5 py-3.5"><span class="text-xs font-medium" style="color:var(--text-muted);" x-text="a.term_months+'mo'"></span></td>
                    <td class="px-5 py-3.5"><svg class="h-4 w-4" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div class="flex items-center justify-between px-5 py-3 border-t" style="border-color:var(--border);"><p class="text-xs" style="color:var(--text-muted);">Showing 1-8 of 847</p><div class="flex gap-1"><button class="rounded-lg px-3 py-1.5 text-xs font-medium" style="background:rgba(97,114,243,0.1);color:var(--brand-600);">1</button><button class="rounded-lg px-3 py-1.5 text-xs font-medium" style="color:var(--text-muted);">2</button><button class="rounded-lg px-3 py-1.5 text-xs font-medium" style="color:var(--text-muted);">3</button><span class="px-1 text-xs" style="color:var(--text-muted);">...</span><button class="rounded-lg px-3 py-1.5 text-xs font-medium" style="color:var(--text-muted);">106</button></div></div>
        </div>
      </div>
    </div></main>
  </div>
</div>
</body>
</html>
