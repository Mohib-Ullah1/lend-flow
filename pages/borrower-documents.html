<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Documents · LendFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/><script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b'}}}}}</script>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-secondary);color:var(--text-primary);">
<header class="sticky top-0 z-30 border-b backdrop-blur-sm" style="background:var(--surface-glass);border-color:var(--border);"><div class="mx-auto max-w-4xl flex items-center justify-between px-6 h-14"><a href="borrower-dashboard.html" class="flex items-center gap-2 text-sm font-medium" style="color:var(--text-secondary);"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>Dashboard</a><button @click="$store.theme.toggle()" class="rounded-lg p-2" style="color:var(--text-muted);"><svg x-show="!$store.theme.dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg><svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg></button></div></header>

<main class="mx-auto max-w-4xl px-6 py-8" x-data="{ uploadFiles: [], isDragging: false, formatSize(b) { return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; } }">
  <div class="space-y-6 animate-fade-in">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div><h1 class="text-[24px] font-bold tracking-tight" style="letter-spacing:-0.02em;">My Documents</h1><p class="mt-1 text-sm" style="color:var(--text-muted);">View and manage your uploaded documents.</p></div>
    </div>

    <!-- Upload area -->
    <div @dragover.prevent="isDragging=true" @dragleave.prevent="isDragging=false" @drop.prevent="isDragging=false; uploadFiles=[...uploadFiles,...$event.dataTransfer.files];" @click="$refs.fileInput.click()"
         class="rounded-2xl border-2 border-dashed p-8 text-center cursor-pointer transition-all" :style="isDragging?'border-color:var(--brand-500);background:rgba(97,114,243,0.04);':'border-color:var(--border);'">
      <input type="file" x-ref="fileInput" @change="uploadFiles=[...uploadFiles,...$event.target.files];" accept="image/*,.pdf" multiple class="hidden"/>
      <svg class="h-10 w-10 mx-auto mb-3" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
      <p class="text-sm font-medium">Drop files here or <span class="text-brand-600">click to browse</span></p>
      <p class="text-xs mt-1" style="color:var(--text-muted);">PDF, JPG, PNG up to 10MB each</p>
    </div>

    <!-- Pending uploads -->
    <template x-if="uploadFiles.length">
      <div class="space-y-2">
        <p class="text-sm font-semibold">Pending Upload</p>
        <template x-for="(f,i) in uploadFiles" :key="i">
          <div class="flex items-center gap-3 rounded-xl border p-3 animate-fade-in" style="border-color:var(--border);background:var(--surface);">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg flex-shrink-0" style="background:rgba(97,114,243,0.08);"><svg class="h-5 w-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></div>
            <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate" x-text="f.name"></p><p class="text-xs" style="color:var(--text-muted);" x-text="formatSize(f.size)"></p></div>
            <button @click="uploadFiles.splice(i,1)" class="rounded-lg p-1.5" style="color:var(--text-muted);"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </div>
        </template>
        <button @click="uploadFiles=[]" class="rounded-xl bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-brand-700 btn-glow">Upload All</button>
      </div>
    </template>

    <!-- Existing documents -->
    <div>
      <h2 class="text-sm font-semibold mb-4">Verified Documents</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <template x-for="doc in [
          {name:'drivers_license.jpg',type:'Government ID',size:'2.4 MB',date:'Mar 20, 2026',status:'Verified',sc:'emerald'},
          {name:'utility_bill_march.pdf',type:'Proof of Address',size:'856 KB',date:'Mar 20, 2026',status:'Verified',sc:'emerald'},
          {name:'pay_stub_feb2026.pdf',type:'Income Proof',size:'1.1 MB',date:'Mar 20, 2026',status:'Verified',sc:'emerald'},
          {name:'loan_agreement_LN00847.pdf',type:'Loan Agreement',size:'340 KB',date:'Mar 21, 2026',status:'Signed',sc:'blue'},
          {name:'loan_agreement_LN01234.pdf',type:'Loan Agreement',size:'385 KB',date:'Feb 1, 2026',status:'Signed',sc:'blue'},
          {name:'tax_return_2025.pdf',type:'Tax Return',size:'2.1 MB',date:'Mar 20, 2026',status:'Verified',sc:'emerald'}
        ]" :key="doc.name">
          <div class="flex items-center gap-3 rounded-xl border p-4 transition card-lift" style="background:var(--surface);border-color:var(--border);">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg flex-shrink-0" style="background:rgba(97,114,243,0.08);"><svg class="h-5 w-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium truncate" x-text="doc.name"></p>
              <p class="text-xs" style="color:var(--text-muted);"><span x-text="doc.type"></span> · <span x-text="doc.size"></span> · <span x-text="doc.date"></span></p>
            </div>
            <span class="inline-flex items-center gap-1 text-[11px] font-semibold" :class="'text-'+doc.sc+'-600'" x-text="doc.status"></span>
            <button class="rounded-lg p-2 transition" style="color:var(--text-muted);" onmouseover="this.style.background='var(--surface-tertiary)'" onmouseout="this.style.background='transparent'"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg></button>
          </div>
        </template>
      </div>
    </div>
  </div>
</main>
<script>
if (!api.isLoggedIn()) { window.location.href = 'login.html'; }
document.addEventListener('alpine:init', () => {
  Alpine.data('docsData', () => ({
    documents: [], loading: true,
    async init() {
      try {
        const res = await api.getDocuments();
        this.documents = res.results || [];
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    async uploadFiles(files) {
      for (const file of files) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('document_type', 'general');
        fd.append('borrower', '');  // Would need borrower ID
        try { await api.uploadDocument(fd); } catch(e) { console.error(e); }
      }
      const res = await api.getDocuments();
      this.documents = res.results || [];
      showToast('Upload Complete', 'success');
    }
  }));
});
</script>
</body>
</html>
