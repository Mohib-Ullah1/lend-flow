<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports · LendFlow Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/><script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b'}}}}}</script>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-secondary);color:var(--text-primary);">
<header class="sticky top-0 z-30 border-b backdrop-blur-sm" style="background:var(--surface-glass);border-color:var(--border);"><div class="mx-auto max-w-5xl flex items-center justify-between px-6 h-14"><a href="admin-dashboard.html" class="flex items-center gap-2 text-sm font-medium" style="color:var(--text-secondary);"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>Dashboard</a><button @click="$store.theme.toggle()" class="rounded-lg p-2" style="color:var(--text-muted);"><svg x-show="!$store.theme.dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg><svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg></button></div></header>

<main class="mx-auto max-w-5xl px-6 py-8" x-data="{ generating: false, generated: false }">
  <div class="space-y-8 animate-fade-in">
    <div><h1 class="text-[24px] font-bold tracking-tight" style="letter-spacing:-0.02em;">Reports</h1><p class="mt-1 text-sm" style="color:var(--text-muted);">Generate, download, and schedule reports.</p></div>

    <!-- Quick reports -->
    <div>
      <h2 class="text-sm font-semibold mb-4">Generate Report</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 stagger">
        <template x-for="r in [
          {title:'Portfolio Summary',desc:'Active loans, outstanding balances, default rates, and risk distribution.',icon:'M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z'},
          {title:'Collections Report',desc:'Delinquency aging, dunning activity, recovery rates.',icon:'M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293'},
          {title:'Financial Statement',desc:'Income statement, balance sheet, and cash flow.',icon:'M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25'},
          {title:'Application Pipeline',desc:'Submission volumes, approval rates, processing times.',icon:'M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z'},
          {title:'Investor Report',desc:'Portfolio performance, IRR, PAR metrics, and diversification.',icon:'M2.25 18L9 11.25l4.306 4.306a11.95 11.95 0 015.814-5.518l2.74-1.22m0 0l-5.94-2.281m5.94 2.28l-2.28 5.941'},
          {title:'Compliance Report',desc:'KYC/AML status, audit trail, regulatory metrics.',icon:'M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z'}
        ]" :key="r.title">
          <div class="rounded-2xl border p-5 shadow-sm cursor-pointer card-lift group" style="background:var(--surface);border-color:var(--border);"
               @click="generating=true; api.generateReport('portfolio_summary','pdf').then(()=>{generating=false;generated=true;setTimeout(()=>generated=false,3000);}).catch(()=>{generating=false;});">
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 items-center justify-center rounded-xl flex-shrink-0 transition group-hover:scale-105" style="background:rgba(97,114,243,0.08);"><svg class="h-5 w-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" :d="r.icon"/></svg></div>
              <div class="flex-1">
                <p class="text-sm font-semibold" x-text="r.title"></p>
                <p class="text-xs mt-1 leading-relaxed" style="color:var(--text-muted);" x-text="r.desc"></p>
              </div>
            </div>
            <div class="flex items-center gap-2 mt-4 pt-3 border-t" style="border-color:var(--border);">
              <button class="flex-1 flex items-center justify-center gap-1.5 rounded-lg py-2 text-xs font-semibold text-brand-600 transition" style="background:rgba(97,114,243,0.08);" onmouseover="this.style.background='rgba(97,114,243,0.15)'" onmouseout="this.style.background='rgba(97,114,243,0.08)'">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                PDF
              </button>
              <button class="flex-1 flex items-center justify-center gap-1.5 rounded-lg py-2 text-xs font-semibold transition" style="color:var(--text-secondary);background:var(--surface-secondary);" onmouseover="this.style.background='var(--surface-tertiary)'" onmouseout="this.style.background='var(--surface-secondary)'">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
                Excel
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Recent Reports -->
    <div>
      <h2 class="text-sm font-semibold mb-4">Recent Reports</h2>
      <div class="rounded-2xl border shadow-sm overflow-hidden" style="background:var(--surface);border-color:var(--border);">
        <div class="divide-y" style="border-color:var(--border);">
          <template x-for="rr in [
            {name:'Portfolio Summary — March 2026',format:'PDF',size:'2.4 MB',date:'Mar 27, 2026',by:'Admin User'},
            {name:'Collections Report — Q1 2026',format:'Excel',size:'1.8 MB',date:'Mar 25, 2026',by:'Admin User'},
            {name:'Financial Statement — February 2026',format:'PDF',size:'3.1 MB',date:'Mar 1, 2026',by:'System (scheduled)'},
            {name:'Investor Report — Q4 2025',format:'PDF',size:'4.2 MB',date:'Jan 5, 2026',by:'Admin User'},
            {name:'Compliance Audit — 2025',format:'PDF',size:'8.7 MB',date:'Jan 2, 2026',by:'System (scheduled)'}
          ]" :key="rr.name">
            <div class="flex items-center gap-4 px-5 py-4 transition" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg flex-shrink-0" :style="rr.format==='PDF'?'background:rgba(239,68,68,0.08);':'background:rgba(16,185,129,0.08);'">
                <span class="text-[10px] font-bold" :style="rr.format==='PDF'?'color:#dc2626;':'color:#059669;'" x-text="rr.format"></span>
              </div>
              <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate" x-text="rr.name"></p><p class="text-xs" style="color:var(--text-muted);"><span x-text="rr.size"></span> · <span x-text="rr.date"></span> · <span x-text="rr.by"></span></p></div>
              <button class="rounded-lg p-2.5 transition" style="color:var(--text-muted);" onmouseover="this.style.background='var(--surface-tertiary)';this.style.color='var(--brand-600)'" onmouseout="this.style.background='transparent';this.style.color='var(--text-muted)'"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg></button>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Scheduled Reports -->
    <div>
      <h2 class="text-sm font-semibold mb-4">Scheduled Reports</h2>
      <div class="rounded-2xl border p-5 shadow-sm" style="background:var(--surface);border-color:var(--border);">
        <div class="space-y-3">
          <template x-for="s in [{name:'Monthly Financial Statement',freq:'1st of every month',next:'Apr 1, 2026',fmt:'PDF'},{name:'Weekly Collections Summary',freq:'Every Monday',next:'Mar 30, 2026',fmt:'Excel'},{name:'Quarterly Investor Report',freq:'Every quarter',next:'Jul 1, 2026',fmt:'PDF'}]" :key="s.name">
            <div class="flex items-center justify-between rounded-xl p-4" style="background:var(--surface-secondary);">
              <div class="flex items-center gap-3">
                <svg class="h-5 w-5" style="color:var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
                <div><p class="text-sm font-medium" x-text="s.name"></p><p class="text-xs" style="color:var(--text-muted);"><span x-text="s.freq"></span> · Next: <span x-text="s.next"></span> · <span x-text="s.fmt"></span></p></div>
              </div>
              <div class="flex items-center gap-2">
                <span class="inline-flex items-center gap-1 rounded-lg px-2 py-0.5 text-[11px] font-semibold" style="background:rgba(16,185,129,0.1);color:#059669;">Active</span>
                <button class="text-xs font-medium text-brand-600 hover:text-brand-700 transition">Edit</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Generating toast -->
  <div x-show="generating" x-transition class="fixed bottom-6 right-6 z-50 flex items-center gap-3 rounded-2xl border px-5 py-4 shadow-lg" style="background:var(--surface);border-color:var(--border);">
    <svg class="h-5 w-5 animate-spin text-brand-500" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
    <span class="text-sm font-medium">Generating report...</span>
  </div>
  <div x-show="generated" x-transition class="fixed bottom-6 right-6 z-50 flex items-center gap-3 rounded-2xl border px-5 py-4 shadow-lg" style="background:var(--surface);border-color:var(--border);">
    <svg class="h-5 w-5 text-emerald-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"/></svg>
    <span class="text-sm font-medium">Report ready for download!</span>
  </div>
</main>
<script>if (!api.isLoggedIn()) window.location.href = "login.html";</script>
</body>
</html>
