<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employment Details · LendFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/styles.css" />
  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }, colors: { brand: { 50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b' } } } }
    }
  </script>
</head>
<body class="min-h-screen font-sans antialiased" style="background: var(--surface-secondary); color: var(--text-primary);">

<!-- Top bar -->
<header class="sticky top-0 z-30 border-b" style="background: var(--surface); border-color: var(--border);">
  <div class="mx-auto max-w-3xl flex items-center justify-between px-6 h-16">
    <a href="/" class="flex items-center gap-2.5">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600">
        <svg class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>
      </div>
      <span class="text-base font-semibold" style="color: var(--text-primary);">LendFlow</span>
    </a>
    <button class="text-sm font-medium text-brand-600 hover:text-brand-700 transition">Save & exit</button>
  </div>
</header>

<main class="mx-auto max-w-3xl px-6 py-10">

  <!-- Progress -->
  <div class="mb-10 animate-fade-in">
    <div class="flex items-center justify-between mb-4">
      <p class="text-sm font-medium" style="color: var(--text-muted);">Step 2 of 4</p>
      <p class="text-sm font-medium" style="color: var(--text-muted);">Employment & Income</p>
    </div>
    <div class="h-1.5 w-full rounded-full overflow-hidden" style="background: var(--surface-tertiary);">
      <div class="h-full rounded-full bg-brand-600 transition-all duration-700" style="width: 50%;"></div>
    </div>
    <div class="flex justify-between mt-3">
      <span class="text-xs font-medium text-emerald-500 flex items-center gap-1">
        <svg class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"/></svg>
        Personal
      </span>
      <span class="text-xs font-semibold text-brand-600">Employment</span>
      <span class="text-xs font-medium" style="color: var(--text-muted);">Documents</span>
      <span class="text-xs font-medium" style="color: var(--text-muted);">Review</span>
    </div>
  </div>

  <!-- Form card -->
  <div class="rounded-3xl border p-8 sm:p-10 shadow-sm animate-fade-up" style="background: var(--surface); border-color: var(--border);"
       x-data="{ empStatus: '', showEmployer: false }" x-effect="showEmployer = ['full_time','part_time','contract'].includes(empStatus)">

    <div class="mb-8">
      <h1 class="text-[26px] font-bold tracking-tight" style="letter-spacing: -0.02em;">Employment & Income</h1>
      <p class="mt-2 text-[15px]" style="color: var(--text-secondary);">Your employment details help us assess your loan eligibility and determine appropriate terms.</p>
    </div>

    <form class="space-y-6" action="onboarding-step3.html">

      <!-- Employment Status (Card-style radio) -->
      <div>
        <label class="block text-[13px] font-medium mb-3" style="color: var(--text-primary);">Employment status <span class="text-red-400">*</span></label>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <template x-for="opt in [
            { value: 'full_time', label: 'Full-time', icon: 'M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z' },
            { value: 'part_time', label: 'Part-time', icon: 'M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z' },
            { value: 'contract', label: 'Contract', icon: 'M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z' },
            { value: 'self_employed', label: 'Self-employed', icon: 'M13.5 21v-7.5a.75.75 0 01.75-.75h3a.75.75 0 01.75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349m-16.5 11.65V9.35m0 0a3.001 3.001 0 003.75-.615A2.993 2.993 0 009.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 002.25 1.016c.896 0 1.7-.393 2.25-1.016a3.001 3.001 0 003.75.614m-16.5 0a3.004 3.004 0 01-.621-4.72L4.318 3.44A1.5 1.5 0 015.378 3h13.243a1.5 1.5 0 011.06.44l1.19 1.189a3 3 0 01-.621 4.72m-13.5 8.65h3.75a.75.75 0 00.75-.75V13.5a.75.75 0 00-.75-.75H6.75a.75.75 0 00-.75.75v3.75c0 .415.336.75.75.75z' },
            { value: 'retired', label: 'Retired', icon: 'M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z' },
            { value: 'unemployed', label: 'Unemployed', icon: 'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636' }
          ]" :key="opt.value">
            <label class="relative flex flex-col items-center gap-2 rounded-xl border-2 p-4 cursor-pointer transition-all"
                   :style="empStatus === opt.value ? 'border-color: var(--brand-500); background: rgba(97,114,243,0.04);' : 'border-color: var(--border); background: var(--surface);'"
                   @mouseenter="if(empStatus !== opt.value) $el.style.borderColor='var(--border-strong)';"
                   @mouseleave="if(empStatus !== opt.value) $el.style.borderColor='var(--border)';">
              <input type="radio" name="employment_status" :value="opt.value" x-model="empStatus" class="sr-only" required />
              <svg class="h-5 w-5 transition" :style="empStatus === opt.value ? 'color: var(--brand-600);' : 'color: var(--text-muted);'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" :d="opt.icon"/></svg>
              <span class="text-xs font-medium text-center" :style="empStatus === opt.value ? 'color: var(--brand-700);' : 'color: var(--text-secondary);'" x-text="opt.label"></span>
              <!-- Check indicator -->
              <div x-show="empStatus === opt.value" x-transition class="absolute top-2 right-2">
                <svg class="h-4 w-4 text-brand-600" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"/></svg>
              </div>
            </label>
          </template>
        </div>
      </div>

      <!-- Employer details (conditional) -->
      <div x-show="showEmployer" x-transition class="space-y-5">
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
          <div>
            <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Employer name <span class="text-red-400">*</span></label>
            <input type="text" placeholder="Acme Corporation"
                   class="w-full rounded-xl border py-3 px-4 text-sm input-ring"
                   style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                   onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';" />
          </div>
          <div>
            <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Job title</label>
            <input type="text" placeholder="Software Engineer"
                   class="w-full rounded-xl border py-3 px-4 text-sm input-ring"
                   style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                   onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';" />
          </div>
        </div>
        <div>
          <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">How long at current employer?</label>
          <select class="w-full rounded-xl border py-3 px-4 text-sm input-ring appearance-none"
                  style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                  onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                  onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';">
            <option value="">Select duration</option>
            <option>Less than 6 months</option>
            <option>6 months - 1 year</option>
            <option>1 - 2 years</option>
            <option>2 - 5 years</option>
            <option>5+ years</option>
          </select>
        </div>
      </div>

      <!-- Income -->
      <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
        <div>
          <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Annual income (before tax) <span class="text-red-400">*</span></label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-medium" style="color: var(--text-muted);">$</span>
            <input type="text" required placeholder="75,000"
                   class="w-full rounded-xl border py-3 pl-8 pr-4 text-sm font-mono input-ring"
                   style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                   onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';" />
          </div>
        </div>
        <div>
          <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Monthly expenses</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-medium" style="color: var(--text-muted);">$</span>
            <input type="text" placeholder="3,500"
                   class="w-full rounded-xl border py-3 pl-8 pr-4 text-sm font-mono input-ring"
                   style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                   onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';" />
          </div>
          <p class="mt-1.5 text-xs" style="color: var(--text-muted);">Rent, utilities, existing loans, etc.</p>
        </div>
      </div>

      <!-- Additional income source -->
      <div>
        <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Additional income sources</label>
        <select class="w-full rounded-xl border py-3 px-4 text-sm input-ring appearance-none"
                style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';">
          <option value="">None</option>
          <option>Rental income</option>
          <option>Investments / dividends</option>
          <option>Freelance / side business</option>
          <option>Pension / social security</option>
          <option>Alimony / child support</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Divider -->
      <div class="border-t" style="border-color: var(--border);"></div>

      <!-- Actions -->
      <div class="flex items-center justify-between pt-2">
        <a href="onboarding-step1.html"
           class="flex items-center gap-2 rounded-xl px-5 py-3 text-sm font-medium transition"
           style="color: var(--text-secondary);"
           onmouseover="this.style.background='var(--surface-secondary)';"
           onmouseout="this.style.background='transparent';">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
          Back
        </a>
        <button type="submit"
                class="flex items-center gap-2 rounded-xl bg-brand-600 px-6 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 btn-glow">
          Continue
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </div>
    </form>
  </div>
</main>

<!-- Theme toggle -->
<div class="fixed bottom-6 right-6 z-50">
  <button @click="$store.theme.toggle()" class="flex h-10 w-10 items-center justify-center rounded-xl border shadow-sm transition hover:shadow-md" style="background: var(--surface); border-color: var(--border);">
    <svg x-show="!$store.theme.dark" class="h-4 w-4" style="color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    <svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" style="color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
  </button>
</div>

<script>if (!api.isLoggedIn()) window.location.href = "login.html";</script>
</body>
</html>
