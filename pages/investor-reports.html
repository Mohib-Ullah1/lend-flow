<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports · LendFlow Investor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/><script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b'}}}}}</script>
</head>
<body class="min-h-screen font-sans antialiased" style="background:var(--surface-secondary);color:var(--text-primary);">
<header class="sticky top-0 z-30 border-b backdrop-blur-sm" style="background:var(--surface-glass);border-color:var(--border);"><div class="mx-auto max-w-5xl flex items-center justify-between px-6 h-16"><a href="#" class="flex items-center gap-2.5"><div class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600"><svg class="h-4 w-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75"/></svg></div><span class="text-base font-semibold">LendFlow</span></a><nav class="hidden sm:flex items-center gap-1"><a href="investor-dashboard.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Portfolio</a><a href="investor-performance.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Performance</a><a href="investor-marketplace.html" class="rounded-lg px-3 py-2 text-sm font-medium transition" style="color:var(--text-secondary);">Marketplace</a><a href="investor-reports.html" class="rounded-lg px-3 py-2 text-sm font-medium text-brand-600" style="background:rgba(97,114,243,0.08);">Reports</a></nav><div class="flex items-center gap-3"><button @click="$store.theme.toggle()" class="rounded-lg p-2" style="color:var(--text-muted);"><svg x-show="!$store.theme.dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg><svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg></button><div class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">RJ</div></div></div></header>

<main class="mx-auto max-w-5xl px-6 py-8">
  <div class="space-y-8 animate-fade-in">
    <div><h1 class="text-[24px] font-bold tracking-tight" style="letter-spacing:-0.02em;">Investor Reports</h1><p class="mt-1 text-sm" style="color:var(--text-muted);">Download portfolio statements and tax documents.</p></div>

    <!-- Generate -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 stagger">
      <template x-for="r in [
        {title:'Portfolio Statement',desc:'Complete breakdown of investments, returns, and outstanding balances.',icon:'M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z'},
        {title:'Tax Document (1099-INT)',desc:'Interest income earned for tax reporting purposes.',icon:'M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z'},
        {title:'Transaction History',desc:'All investment transactions, payments received, and adjustments.',icon:'M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z'},
        {title:'Risk Analysis',desc:'PAR metrics, default exposure, and diversification analysis.',icon:'M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z'}
      ]" :key="r.title">
        <div class="rounded-2xl border p-5 shadow-sm card-lift" style="background:var(--surface);border-color:var(--border);">
          <div class="flex items-start gap-4 mb-4"><div class="flex h-10 w-10 items-center justify-center rounded-xl flex-shrink-0" style="background:rgba(97,114,243,0.08);"><svg class="h-5 w-5 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" :d="r.icon"/></svg></div><div><p class="text-sm font-semibold" x-text="r.title"></p><p class="text-xs mt-1" style="color:var(--text-muted);" x-text="r.desc"></p></div></div>
          <div class="flex gap-2"><button class="flex-1 flex items-center justify-center gap-1.5 rounded-lg py-2 text-xs font-semibold text-brand-600 transition" style="background:rgba(97,114,243,0.08);"><svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>PDF</button><button class="flex-1 flex items-center justify-center gap-1.5 rounded-lg py-2 text-xs font-semibold transition" style="color:var(--text-secondary);background:var(--surface-secondary);">CSV</button></div>
        </div>
      </template>
    </div>

    <!-- Past reports -->
    <div>
      <h2 class="text-sm font-semibold mb-4">Downloaded Reports</h2>
      <div class="rounded-2xl border shadow-sm" style="background:var(--surface);border-color:var(--border);">
        <div class="divide-y" style="border-color:var(--border);">
          <template x-for="rr in [
            {name:'Portfolio Statement — Q1 2026',fmt:'PDF',size:'3.2 MB',date:'Mar 27, 2026'},
            {name:'Tax Document 1099-INT — 2025',fmt:'PDF',size:'1.1 MB',date:'Jan 31, 2026'},
            {name:'Transaction History — 2025',fmt:'CSV',size:'890 KB',date:'Jan 15, 2026'},
            {name:'Portfolio Statement — Q4 2025',fmt:'PDF',size:'2.8 MB',date:'Jan 5, 2026'},
            {name:'Risk Analysis — Q4 2025',fmt:'PDF',size:'1.5 MB',date:'Jan 5, 2026'}
          ]" :key="rr.name">
            <div class="flex items-center gap-4 px-5 py-4 transition" onmouseover="this.style.background='var(--surface-secondary)'" onmouseout="this.style.background='transparent'">
              <div class="flex h-10 w-10 items-center justify-center rounded-lg flex-shrink-0" :style="rr.fmt==='PDF'?'background:rgba(239,68,68,0.08);':'background:rgba(16,185,129,0.08);'"><span class="text-[10px] font-bold" :style="rr.fmt==='PDF'?'color:#dc2626;':'color:#059669;'" x-text="rr.fmt"></span></div>
              <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate" x-text="rr.name"></p><p class="text-xs" style="color:var(--text-muted);"><span x-text="rr.size"></span> · <span x-text="rr.date"></span></p></div>
              <button class="rounded-lg p-2.5 transition" style="color:var(--text-muted);" onmouseover="this.style.background='var(--surface-tertiary)';this.style.color='var(--brand-600)'" onmouseout="this.style.background='transparent';this.style.color='var(--text-muted)'"><svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg></button>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
if (!api.isLoggedIn()) window.location.href = 'login.html';
api.getReports().then(res => console.log('Reports:', res.count)).catch(e => console.error(e));
</script>
</body>
</html>
