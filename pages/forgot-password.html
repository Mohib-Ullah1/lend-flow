<!DOCTYPE html>
<html lang="en" x-data x-bind:class="{ 'dark': $store.theme.dark }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · LendFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../static/css/styles.css" />
  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { brand: { 50:'#f0f5ff',100:'#e0eaff',200:'#c7d7fe',300:'#a4bcfd',400:'#8098f9',500:'#6172f3',600:'#444ce7',700:'#3538cd',800:'#2d31a6',900:'#2b2f83',950:'#1f235b' } },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen font-sans antialiased grain" style="background: var(--surface-secondary); color: var(--text-primary);">

<div class="flex min-h-screen items-center justify-center p-6 mesh-gradient">
  <div class="w-full max-w-[440px] animate-fade-up" x-data="{ sent: false, loading: false, email: '' }">

    <!-- Back to login -->
    <a href="login.html" class="inline-flex items-center gap-2 text-sm font-medium mb-8 transition hover:opacity-80" style="color: var(--text-secondary);">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>
      Back to sign in
    </a>

    <!-- Card -->
    <div class="rounded-3xl border p-8 sm:p-10 shadow-lg inner-glow" style="background: var(--surface); border-color: var(--border);">

      <!-- ===== STATE: REQUEST FORM ===== -->
      <div x-show="!sent">
        <!-- Icon -->
        <div class="flex h-14 w-14 items-center justify-center rounded-2xl mb-6" style="background: rgba(97, 114, 243, 0.08);">
          <svg class="h-6 w-6 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>

        <h1 class="text-[24px] font-bold tracking-tight mb-2" style="color: var(--text-primary); letter-spacing: -0.02em;">Forgot your password?</h1>
        <p class="text-[15px] mb-8" style="color: var(--text-secondary);">No worries. Enter your email and we'll send you a reset link.</p>

        <form @submit.prevent="loading = true; setTimeout(() => { loading = false; sent = true; }, 1500);" class="space-y-5">
          <div>
            <label class="block text-[13px] font-medium mb-1.5" style="color: var(--text-primary);">Email address</label>
            <input type="email" required x-model="email" autocomplete="email"
                   placeholder="you@company.com"
                   class="w-full rounded-xl border py-3 px-4 text-sm input-ring"
                   style="background: var(--surface-secondary); border-color: var(--border); color: var(--text-primary);"
                   onfocus="this.style.borderColor='var(--brand-500)'; this.style.boxShadow='0 0 0 3px rgba(97,114,243,0.15)'; this.style.background='var(--surface)';"
                   onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'; this.style.background='var(--surface-secondary)';" />
          </div>

          <button type="submit" :disabled="loading"
                  class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition-all hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500/40 focus:ring-offset-2 disabled:opacity-60 btn-glow">
            <span x-show="!loading">Send reset link</span>
            <svg x-show="!loading" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            <svg x-show="loading" x-cloak class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
          </button>
        </form>
      </div>

      <!-- ===== STATE: EMAIL SENT SUCCESS ===== -->
      <div x-show="sent" x-transition class="text-center">
        <!-- Animated checkmark -->
        <div class="flex h-16 w-16 items-center justify-center rounded-full mx-auto mb-6 animate-bounce-in" style="background: rgba(16, 185, 129, 0.1);">
          <svg class="h-7 w-7 text-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 13l4 4L19 7" style="stroke-dasharray: 48; animation: checkmark-draw 0.6s ease-out 0.3s both;"/>
          </svg>
        </div>

        <h2 class="text-[22px] font-bold tracking-tight mb-2" style="color: var(--text-primary); letter-spacing: -0.02em;">Check your email</h2>
        <p class="text-[15px] mb-2" style="color: var(--text-secondary);">We've sent a password reset link to</p>
        <p class="text-[15px] font-semibold mb-8" style="color: var(--text-primary);" x-text="email"></p>

        <div class="space-y-3">
          <a href="https://mail.google.com" target="_blank" rel="noopener"
             class="flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 btn-glow">
            Open email app
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
          </a>
          <button @click="sent = false; email = ''"
                  class="flex w-full items-center justify-center rounded-xl border px-4 py-3 text-sm font-medium transition"
                  style="border-color: var(--border); color: var(--text-secondary);"
                  onmouseover="this.style.background='var(--surface-secondary)';"
                  onmouseout="this.style.background='transparent';">
            Try a different email
          </button>
        </div>

        <p class="mt-8 text-xs" style="color: var(--text-muted);">
          Didn't receive the email? Check your spam folder or
          <button @click="sent = false" class="font-medium text-brand-600 hover:text-brand-700 transition">try again</button>.
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Theme toggle -->
<div class="fixed bottom-6 right-6 z-50">
  <button @click="$store.theme.toggle()" class="flex h-10 w-10 items-center justify-center rounded-xl border shadow-sm transition hover:shadow-md" style="background: var(--surface); border-color: var(--border);">
    <svg x-show="!$store.theme.dark" class="h-4 w-4" style="color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
    <svg x-show="$store.theme.dark" x-cloak class="h-4 w-4" style="color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
  </button>
</div>

</body>
</html>
